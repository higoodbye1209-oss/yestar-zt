<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艺星·臻味 — 产品原型</title>
<style>
:root {
  --primary: #722424;
  --gold: #C89A38;
  --canvas: #F9F2ED;
  --ink: #333333;
  --ink-muted: #666666;
  --serif: 'Times New Roman', 'Noto Serif SC', 'STSong', 'Songti SC', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans);
  background: linear-gradient(160deg, #1A0A0D 0%, #2D1118 40%, #1A0A0D 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: var(--canvas);
  border-radius: 24px;
  padding: 56px 48px 44px;
  text-align: center;
  max-width: 520px;
  width: 92%;
  box-shadow: 0 30px 80px rgba(0,0,0,0.45);
}
.brand {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
h1 {
  font-family: var(--serif);
  font-size: 34px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 2px;
  margin-bottom: 8px;
  line-height: 1.2;
}
.subtitle {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink-muted);
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.desc {
  font-size: 13px;
  color: var(--ink-subtle);
  line-height: 1.7;
  margin-bottom: 32px;
}
.divider {
  width: 48px;
  height: 2px;
  background: var(--gold);
  margin: 0 auto 32px;
}
.links {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.link-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #FFFFFF;
  border: 1px solid #EEEEEE;
  border-radius: 14px;
  padding: 20px 24px;
  text-decoration: none;
  transition: all 0.25s;
}
.link-card:hover {
  border-color: var(--gold);
  box-shadow: 0 6px 24px rgba(200,154,56,0.15);
  transform: translateY(-1px);
}
.link-info { text-align: left; }
.link-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 4px;
}
.link-desc {
  font-size: 13px;
  color: var(--ink-muted);
}
.link-arrow {
  width: 36px;
  height: 36px;
  border-radius: 18px;
  background: var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.link-arrow svg { width: 18px; height: 18px; stroke: #FFF; }
.footer {
  margin-top: 36px;
  font-size: 12px;
  color: var(--ink-subtle);
  line-height: 1.8;
}
.footer span { color: var(--primary); font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">YESTAR</div>
  <h1>艺星 · 臻味</h1>
  <div class="subtitle">Medical-Aesthetics In-Clinic Dining</div>
  <div class="desc">医美院内会员点餐系统 · 微信小程序</div>
  <div class="divider"></div>
  <div class="links">
    <a href="c-end.html" class="link-card">
      <div class="link-info">
        <div class="link-title">C 端原型 · 会员端</div>
        <div class="link-desc">WeChat Mini Program · 375×812 · 16 个页面</div>
      </div>
      <div class="link-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
    </a>
    <a href="b-end.html" class="link-card">
      <div class="link-info">
        <div class="link-title">B 端原型 · 管理后台</div>
        <div class="link-desc">Admin Dashboard · 1280×860 · 8 个页面</div>
      </div>
      <div class="link-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
    </a>
    <a href="prd.html" class="link-card">
      <div class="link-info">
        <div class="link-title">产品需求文档 · PRD</div>
        <div class="link-desc">完整需求说明 · 余叶晴 · V1.0</div>
      </div>
      <div class="link-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
    </a>
  </div>
  <div class="footer">
    建议使用 <span>手机竖屏</span> 查看 C 端原型<br>
    B 端请在 <span>桌面浏览器</span> 打开
  </div>
</div>
</body>
</html>
